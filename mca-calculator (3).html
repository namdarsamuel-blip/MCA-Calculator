<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MCA Calc"/>
<title>MCA Calculator</title>
<style>
:root {
  --blue: #0ea5e9;
  --blue-dark: #0284c7;
  --green: #16a34a;
  --red: #dc2626;
  --yellow-bg: #fefce8;
  --yellow-border: #fbbf24;
  --bg: #eef2f7;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --sub: #64748b;
  --muted: #94a3b8;
  --input-bg: #f1f5f9;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  min-height: 100%;
  color: var(--text);
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
}

/* ── HEADER ── */
.app-header {
  padding: max(56px, env(safe-area-inset-top, 56px)) 20px 20px;
  text-align: center;
}
.app-header h1 { font-size: 26px; font-weight: 700; color: var(--text); }
.app-header p  { font-size: 14px; color: var(--sub); margin-top: 4px; }

/* ── MAIN ── */
.main { padding: 0 16px; max-width: 680px; margin: 0 auto; }

/* ── CARD ── */
.card {
  background: var(--card); border-radius: 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
  overflow: hidden;
}

/* ── OPTION HEADER ── */
.option-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 16px;
}
.option-title { font-size: 18px; font-weight: 600; }
.btn-delete {
  background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 12px; font-size: 16px;
  color: var(--muted); cursor: pointer; line-height: 1;
}
.btn-delete:active { background: #fee2e2; color: var(--red); }

/* ── INPUTS ── */
.inputs-section { padding: 0 20px 20px; }
.field-label { font-size: 14px; color: var(--sub); display: block; margin-bottom: 8px; }

.amount-box {
  display: flex; align-items: center; gap: 4px;
  background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 13px 16px; margin-bottom: 12px;
}
.amount-prefix { font-size: 20px; color: var(--sub); line-height: 1; }
.amount-input {
  border: none; outline: none; background: transparent;
  font-size: 22px; width: 100%; font-family: inherit; color: var(--text);
}

.adj-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.btn-adj {
  padding: 13px 0; border-radius: 12px; border: none;
  font-size: 16px; cursor: pointer; font-family: inherit;
}
.btn-adj.pos { background: #dcfce7; color: var(--green); }
.btn-adj.pos:active { background: #bbf7d0; }
.btn-adj.neg { background: #fee2e2; color: var(--red); }
.btn-adj.neg:active { background: #fecaca; }

.factor-term { display: grid; grid-template-columns: 1fr 1.7fr; gap: 12px; margin-top: 16px; }

.spinner-wrap {
  display: flex; align-items: center;
  background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 12px; height: 50px; overflow: hidden;
}
.spin-btn {
  width: 44px; height: 50px; border: none; background: transparent;
  font-size: 22px; color: var(--sub); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.spin-btn:active { background: var(--border); }
.spin-val { flex: 1; text-align: center; font-size: 18px; color: var(--text); }

.term-row { display: flex; gap: 8px; }
.term-select {
  flex: 0 0 auto; border: 1.5px solid var(--border); border-radius: 12px;
  padding: 0 10px; height: 50px; font-size: 17px;
  background: var(--input-bg); color: var(--text);
  font-family: inherit; outline: none; cursor: pointer;
}

/* ── DIVIDER ── */
.section-divider { height: 1px; background: var(--border); }

/* ── OVERVIEW ── */
.overview-section { padding: 18px 20px 20px; }
.overview-title { font-size: 15px; font-weight: 600; color: var(--sub); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.cell-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.cell {
  background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 4px; text-align: center;
}
.cell.hl { background: var(--yellow-bg); border-color: var(--yellow-border); }
.cell-lbl { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.cell-val { font-size: 17px; font-weight: 600; color: var(--text); }
.cell-val.grn { color: var(--green); }
.cell-val.red { color: var(--red); }

/* ── ADD OPTION ── */
.btn-add-option {
  width: 100%; padding: 16px; background: var(--card);
  border: 2px dashed #cbd5e1; border-radius: 20px;
  font-size: 16px; color: var(--sub); font-family: inherit;
  cursor: pointer; margin-bottom: 16px;
}
.btn-add-option:active { background: var(--input-bg); }

/* ── QUICK PASTE ── */
.paste-head { padding: 18px 20px 0; }
.paste-title { font-size: 17px; font-weight: 600; }
.paste-sub { font-size: 13px; color: var(--sub); margin-top: 3px; }
.paste-body { padding: 12px 20px 20px; }
.paste-ta {
  width: 100%; border: 1.5px solid var(--border); border-radius: 14px;
  padding: 12px 14px; font-size: 16px; font-family: inherit;
  resize: none; outline: none; color: var(--text); line-height: 1.5;
  background: var(--input-bg); min-height: 76px;
}
.paste-ta:focus { border-color: var(--blue); }
.paste-ta.err   { border-color: #fca5a5; }
.parse-err { font-size: 13px; color: var(--red); margin-top: 6px; }

.parsed-hdr {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 14px; margin-bottom: 10px;
}
.parsed-ct { font-size: 14px; color: var(--sub); }
.btn-sel-all {
  background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 6px 14px; font-size: 14px;
  cursor: pointer; color: var(--text); font-family: inherit;
}
.btn-sel-all:active { background: var(--border); }

.parsed-item {
  border: 2px solid var(--border); border-radius: 14px;
  padding: 13px 14px; margin-bottom: 8px; cursor: pointer;
  background: #fafafa;
}
.parsed-item.sel { border-color: var(--blue); background: #f0f9ff; }
.prow { display: flex; gap: 12px; align-items: flex-start; }
.pcheck {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 2px solid #cbd5e1; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: white; margin-top: 2px;
}
.pcheck.on { border-color: var(--blue); background: var(--blue); }
.pinfo { flex: 1; min-width: 0; }
.pmain { font-size: 15px; line-height: 1.5; }
.plbl  { font-weight: 600; }
.pbadges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
.pbadge { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }

.btn-add-parsed {
  width: 100%; padding: 14px; background: var(--blue); color: white;
  border: none; border-radius: 12px; cursor: pointer;
  font-size: 16px; font-weight: 600; font-family: inherit; margin-top: 10px;
}
.btn-add-parsed:active { background: var(--blue-dark); }
.btn-add-parsed:disabled { background: #cbd5e1; cursor: not-allowed; }

code {
  background: #dbeafe; color: var(--blue-dark); padding: 2px 6px;
  border-radius: 5px; font-size: 12px; font-family: inherit;
}

/* ── SUMMARY ── */
.sum-card {
  background: var(--card); border-radius: 20px; margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
  overflow: hidden;
}
.sum-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.sum-title { font-size: 19px; font-weight: 700; }
.sum-sub   { font-size: 13px; color: var(--sub); margin-top: 2px; }

.fields-sec { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.fields-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.fields-grid label { display: flex; align-items: center; gap: 8px; font-size: 15px; cursor: pointer; }
.fields-grid input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--blue); flex-shrink: 0; }

.copy-all-wrap { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.btn-copy-all {
  width: 100%; padding: 13px; background: var(--input-bg);
  border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 15px; color: var(--text); font-family: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-copy-all:active  { background: var(--border); }
.btn-copy-all.copied  { background: #dcfce7; border-color: #86efac; color: var(--green); }

.sum-opts { padding: 4px 20px 16px; }
.sopt { padding: 14px 0; border-bottom: 1px solid var(--border); }
.sopt:last-child { border-bottom: none; }
.sopt-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.sopt-title { font-size: 15px; font-weight: 600; }
.btn-copy-one {
  background: var(--input-bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 6px 12px; font-size: 13px;
  color: var(--text); font-family: inherit; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
}
.btn-copy-one:active { background: var(--border); }
.btn-copy-one.copied { background: #dcfce7; border-color: #86efac; color: var(--green); }
.sopt-text { font-size: 14px; color: var(--sub); line-height: 1.9; white-space: pre-line; }
</style>
</head>
<body>

<div class="app-header">
  <h1>MCA Calculator</h1>
  <p>Compare repayments and generate summaries.</p>
</div>

<div class="main">

  <!-- Quick Paste -->
  <div class="card">
    <div class="paste-head">
      <div class="paste-title">⚡ Quick Paste</div>
      <div class="paste-sub">e.g. <code>Kapitus 166k / 1.399 / 120 weeks</code></div>
    </div>
    <div class="paste-body">
      <textarea class="paste-ta" id="paste-input"
        placeholder="Kapitus 166k / 1.399 / 120 weeks&#10;Aspire 75k / 1.499 / 32 weeks"
      ></textarea>
      <div class="parse-err" id="parse-error" style="display:none;"></div>
      <div id="parsed-results" style="display:none;">
        <div class="parsed-hdr">
          <div class="parsed-ct" id="parsed-count"></div>
          <button class="btn-sel-all" id="btn-select-all">Deselect All</button>
        </div>
        <div id="parsed-list"></div>
        <button class="btn-add-parsed" id="btn-add-parsed">+ Add Options</button>
      </div>
    </div>
  </div>

  <!-- Option cards -->
  <div id="options-container"></div>

  <button class="btn-add-option" id="btn-add-option">+ Add Funding Option</button>

  <!-- Funding Summary -->
  <div class="sum-card">
    <div class="sum-head">
      <div class="sum-title">Funding Summary</div>
      <div class="sum-sub">Copy and paste offers.</div>
    </div>
    <div class="fields-sec">
      <div class="fields-lbl">Displayed Fields</div>
      <div class="fields-grid">
        <label><input type="checkbox" id="field-fundingAmount" checked> Funding Amount</label>
        <label><input type="checkbox" id="field-factorRate" checked> Factor Rate</label>
        <label><input type="checkbox" id="field-termLength" checked> Term Length</label>
        <label><input type="checkbox" id="field-payment" checked> Payment</label>
        <label><input type="checkbox" id="field-paybackAmount" checked> Payback Amount</label>
      </div>
    </div>
    <div class="copy-all-wrap">
      <button class="btn-copy-all" id="btn-copy-all">📋 Copy All</button>
    </div>
    <div class="sum-opts" id="sum-opts"></div>
  </div>

</div>

<script>
let options = [{ id:1, label:'', fundingAmount:10000, factorRate:1.49, termValue:36, termType:'Weeks' }];
let nextId = 2;
let parsedOffers = [], selectedOffers = [];

function toDays(v,t){ return t==='Days'?v:t==='Weeks'?v*5:v*20; }
function calcOpt(fa,fr,tv,tt){
  const p=Math.round(fa*fr), d=toDays(tv,tt);
  const w=Math.round(d/5*10)/10, mo=Math.round(d/20*10)/10;
  return {p, d, w, mo,
    daily:  d>0?Math.round(p/d):0,
    weekly: w>0?Math.round(p/w):0,
    monthly:mo>0?Math.round(p/mo):0};
}
function fmt(n){ return '$'+Number(n).toLocaleString(); }
function getOpt(id){ return options.find(o=>o.id===id); }
function flds(){
  return {
    fundingAmount: document.getElementById('field-fundingAmount').checked,
    factorRate:    document.getElementById('field-factorRate').checked,
    termLength:    document.getElementById('field-termLength').checked,
    payment:       document.getElementById('field-payment').checked,
    paybackAmount: document.getElementById('field-paybackAmount').checked,
  };
}
function optText(opt,idx,f){
  const c=calcOpt(opt.fundingAmount,opt.factorRate,opt.termValue,opt.termType);
  const pl=opt.termType==='Days'?'Daily':opt.termType==='Weeks'?'Weekly':'Monthly';
  const pa=opt.termType==='Days'?c.daily:opt.termType==='Weeks'?c.weekly:c.monthly;
  const title=opt.label?`Option ${idx+1} - ${opt.label}`:`Option ${idx+1}`;
  const lines=[title];
  if(f.fundingAmount) lines.push(`Funding Amount: ${fmt(opt.fundingAmount)}`);
  if(f.factorRate)    lines.push(`Factor Rate: ${opt.factorRate.toFixed(2)}`);
  if(f.termLength)    lines.push(`Term Length: ${opt.termValue} ${opt.termType.toLowerCase()}`);
  if(f.payment)       lines.push(`${pl} Payments: ${fmt(pa)}`);
  if(f.paybackAmount) lines.push(`Payback Amount: ${fmt(c.p)}`);
  return lines.join('\n');
}
function allText(){ const f=flds(); return options.map((o,i)=>optText(o,i,f)).join('\n\n'); }

function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.innerHTML;
    btn.innerHTML='✓ Copied'; btn.classList.add('copied');
    setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('copied'); },2000);
  });
}

// Parse
function parseFormula(line){
  const s=line.trim();
  const m=s.match(/(\d[\d,.]*)([kKmM]?)\s*\/\s*([\d.]+)\s*\/\s*([\d.]+)\s*(days?|weeks?|months?)/i);
  if(!m) return null;
  let amt=parseFloat(m[1].replace(/,/g,''));
  const mul=m[2].toLowerCase();
  if(mul==='k') amt*=1000; if(mul==='m') amt*=1000000;
  const fr=parseFloat(m[3]), tv=parseFloat(m[4]);
  const tt=m[5].toLowerCase().startsWith('week')?'Weeks':m[5].toLowerCase().startsWith('month')?'Months':'Days';
  const lm=s.match(/^([a-zA-Z][a-zA-Z\s]*?)(?=\s*[\d])/);
  const label=lm?lm[1].trim():'';
  if(isNaN(amt)||isNaN(fr)||isNaN(tv)) return null;
  return {label,fundingAmount:amt,factorRate:fr,termValue:tv,termType:tt};
}

function getBadges(p,all){
  const badges=[];
  const d=toDays(p.termValue,p.termType);
  const allD=all.map(x=>toDays(x.termValue,x.termType));
  if(p.fundingAmount===Math.max(...all.map(x=>x.fundingAmount)))
    badges.push({l:'💰 Highest Amount',c:'#1d4ed8',bg:'#dbeafe'});
  if(p.factorRate===Math.min(...all.map(x=>x.factorRate)))
    badges.push({l:'📉 Lowest Rate',c:'#15803d',bg:'#dcfce7'});
  if(d===Math.max(...allD))
    badges.push({l:'📅 Longest Term',c:'#7c3aed',bg:'#ede9fe'});
  if(p.fundingAmount*p.factorRate===Math.min(...all.map(x=>x.fundingAmount*x.factorRate)))
    badges.push({l:'✅ Lowest Payback',c:'#b45309',bg:'#fef3c7'});
  if((p.fundingAmount*p.factorRate-p.fundingAmount)===Math.min(...all.map(x=>x.fundingAmount*x.factorRate-x.fundingAmount)))
    badges.push({l:'💡 Lowest Cost',c:'#0f766e',bg:'#ccfbf1'});
  return badges;
}

// Render option card
function renderOptionCard(opt, idx){
  const c=calcOpt(opt.fundingAmount,opt.factorRate,opt.termValue,opt.termType);
  const hl=opt.termType==='Days'?'days':opt.termType==='Weeks'?'weeks':'months';
  const del=options.length>1?`<button class="btn-delete" onclick="deleteOption(${opt.id})">🗑</button>`:'';

  function cell(lbl,val,cls,h){
    return `<div class="cell${h?' hl':''}">
      <div class="cell-lbl">${lbl}</div>
      <div class="cell-val${cls?' '+cls:''}">${val}</div>
    </div>`;
  }

  return `
  <div class="card" id="option-card-${opt.id}">
    <div class="option-header">
      <span class="option-title">Option ${idx+1}${opt.label?' — '+opt.label:''}</span>
      ${del}
    </div>
    <div class="inputs-section">
      <label class="field-label">Funding Amount</label>
      <div class="amount-box">
        <span class="amount-prefix">$</span>
        <input class="amount-input" type="text" id="amt-${opt.id}"
          value="${Number(opt.fundingAmount).toLocaleString()}"
          onfocus="this.value='${opt.fundingAmount}';this.type='number';"
          onblur="updateAmount(${opt.id},this.value);this.type='text';this.value=Number(this.value||0).toLocaleString();"
          onchange="updateAmount(${opt.id},this.value)">
      </div>
      <div class="adj-row">
        <button class="btn-adj pos" onclick="adjustAmount(${opt.id},100)">+100</button>
        <button class="btn-adj pos" onclick="adjustAmount(${opt.id},1000)">+1k</button>
        <button class="btn-adj pos" onclick="adjustAmount(${opt.id},10000)">+10k</button>
      </div>
      <div class="adj-row" style="margin-bottom:0">
        <button class="btn-adj neg" onclick="adjustAmount(${opt.id},-100)">-100</button>
        <button class="btn-adj neg" onclick="adjustAmount(${opt.id},-1000)">-1k</button>
        <button class="btn-adj neg" onclick="adjustAmount(${opt.id},-10000)">-10k</button>
      </div>
      <div class="factor-term">
        <div>
          <label class="field-label" style="margin-top:16px">Factor Rate</label>
          <div class="spinner-wrap">
            <button class="spin-btn" onclick="adjustFactor(${opt.id},-0.01)">−</button>
            <span class="spin-val">${opt.factorRate.toFixed(2)}</span>
            <button class="spin-btn" onclick="adjustFactor(${opt.id},0.01)">+</button>
          </div>
        </div>
        <div>
          <label class="field-label" style="margin-top:16px">Term</label>
          <div class="term-row">
            <select class="term-select" onchange="updateTermType(${opt.id},this.value)">
              <option ${opt.termType==='Days'?'selected':''}>Days</option>
              <option ${opt.termType==='Weeks'?'selected':''}>Weeks</option>
              <option ${opt.termType==='Months'?'selected':''}>Months</option>
            </select>
            <div class="spinner-wrap" style="flex:1">
              <button class="spin-btn" onclick="adjustTerm(${opt.id},-1)">−</button>
              <span class="spin-val">${opt.termValue}</span>
              <button class="spin-btn" onclick="adjustTerm(${opt.id},1)">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="overview-section">
      <div class="overview-title">Repayment Overview</div>
      <div class="cell-grid">
        ${cell('Funding Amount',fmt(opt.fundingAmount),'grn',false)}
        ${cell('Factor Rate',opt.factorRate.toFixed(2),'',false)}
        ${cell('Payback Amount',fmt(c.p),'red',false)}
      </div>
      <div class="cell-grid">
        ${cell('Days',c.d,'',hl==='days')}
        ${cell('Weeks',c.w,'',hl==='weeks')}
        ${cell('Months',c.mo,'',hl==='months')}
      </div>
      <div class="cell-grid">
        ${cell('Daily',fmt(c.daily),'',hl==='days')}
        ${cell('Weekly',fmt(c.weekly),'',hl==='weeks')}
        ${cell('Monthly',fmt(c.monthly),'',hl==='months')}
      </div>
    </div>
  </div>`;
}

function renderSummary(){
  const f=flds();
  document.getElementById('sum-opts').innerHTML=options.map((opt,i)=>{
    const c=calcOpt(opt.fundingAmount,opt.factorRate,opt.termValue,opt.termType);
    const pl=opt.termType==='Days'?'Daily':opt.termType==='Weeks'?'Weekly':'Monthly';
    const pa=opt.termType==='Days'?c.daily:opt.termType==='Weeks'?c.weekly:c.monthly;
    const lines=[];
    if(f.fundingAmount) lines.push(`Funding Amount: ${fmt(opt.fundingAmount)}`);
    if(f.factorRate)    lines.push(`Factor Rate: ${opt.factorRate.toFixed(2)}`);
    if(f.termLength)    lines.push(`Term Length: ${opt.termValue} ${opt.termType.toLowerCase()}`);
    if(f.payment)       lines.push(`${pl} Payments: ${fmt(pa)}`);
    if(f.paybackAmount) lines.push(`Payback Amount: ${fmt(c.p)}`);
    const title=opt.label?`Option ${i+1} — ${opt.label}`:`Option ${i+1}`;
    return `<div class="sopt">
      <div class="sopt-hdr">
        <span class="sopt-title">${title}</span>
        <button class="btn-copy-one" id="cpy-${opt.id}" onclick="copyOne(${opt.id},${i})">📋 Copy</button>
      </div>
      <div class="sopt-text">${lines.join('\n')}</div>
    </div>`;
  }).join('');
}

function renderAll(){
  document.getElementById('options-container').innerHTML=options.map((o,i)=>renderOptionCard(o,i)).join('');
  renderSummary();
}

function updateAmount(id,val){ getOpt(id).fundingAmount=Math.max(0,Number(val)||0); renderAll(); }
function adjustAmount(id,d){   getOpt(id).fundingAmount=Math.max(0,getOpt(id).fundingAmount+d); renderAll(); }
function adjustFactor(id,d){   getOpt(id).factorRate=Math.max(1,Math.round((getOpt(id).factorRate+d)*100)/100); renderAll(); }
function updateTermType(id,v){ getOpt(id).termType=v; renderAll(); }
function adjustTerm(id,d){     getOpt(id).termValue=Math.max(1,getOpt(id).termValue+d); renderAll(); }
function deleteOption(id){     options=options.filter(o=>o.id!==id); renderAll(); }
function addOption(){          options.push({id:nextId++,label:'',fundingAmount:10000,factorRate:1.49,termValue:36,termType:'Weeks'}); renderAll(); }

function copyOne(id,idx){
  copyText(optText(getOpt(id),idx,flds()), document.getElementById(`cpy-${id}`));
}
document.getElementById('btn-copy-all').addEventListener('click',function(){ copyText(allText(),this); });

// Quick Paste
(function(){
  const ta=document.getElementById('paste-input');
  const errEl=document.getElementById('parse-error');
  const resEl=document.getElementById('parsed-results');
  const listEl=document.getElementById('parsed-list');
  const cntEl=document.getElementById('parsed-count');
  const addBtn=document.getElementById('btn-add-parsed');
  const selBtn=document.getElementById('btn-select-all');

  ta.addEventListener('input',()=>{
    const val=ta.value.trim();
    errEl.style.display='none'; ta.classList.remove('err');
    if(!val){ resEl.style.display='none'; parsedOffers=[]; selectedOffers=[]; return; }
    const lines=val.split('\n').filter(l=>l.trim());
    parsedOffers=lines.map(parseFormula).filter(Boolean);
    selectedOffers=parsedOffers.map((_,i)=>i);
    if(lines.length>0&&parsedOffers.length===0){
      errEl.textContent="Couldn't parse. Try: Kapitus 166k / 1.399 / 120 weeks";
      errEl.style.display='block'; ta.classList.add('err'); resEl.style.display='none'; return;
    }
    renderParsed(); resEl.style.display='block';
  });

  selBtn.addEventListener('click',()=>{
    selectedOffers=selectedOffers.length===parsedOffers.length?[]:parsedOffers.map((_,i)=>i);
    renderParsed();
  });

  addBtn.addEventListener('click',()=>{
    const toAdd=parsedOffers.filter((_,i)=>selectedOffers.includes(i));
    // If only the default blank option exists, replace it so pasted items start at Option 1
    const isDefault=options.length===1&&options[0].label===''&&options[0].fundingAmount===10000&&options[0].factorRate===1.49;
    if(isDefault) options=[];
    toAdd.forEach(p=>options.push({id:nextId++,label:p.label,fundingAmount:p.fundingAmount,factorRate:p.factorRate,termValue:p.termValue,termType:p.termType}));
    ta.value=''; parsedOffers=[]; selectedOffers=[]; resEl.style.display='none';
    renderAll();
  });

  function renderParsed(){
    cntEl.innerHTML=`Detected <strong>${parsedOffers.length}</strong> offer${parsedOffers.length>1?'s':''} — <strong>${selectedOffers.length}</strong> selected`;
    selBtn.textContent=selectedOffers.length===parsedOffers.length?'Deselect All':'Select All';
    addBtn.textContent=`+ Add ${selectedOffers.length>1?selectedOffers.length+' Options':selectedOffers.length===1?'1 Option':'Options'}`;
    addBtn.disabled=selectedOffers.length===0;
    addBtn.style.background=selectedOffers.length===0?'#cbd5e1':'';
    listEl.innerHTML=parsedOffers.map((p,i)=>{
      const isSel=selectedOffers.includes(i);
      const payback=Math.round(p.fundingAmount*p.factorRate);
      const cost=payback-p.fundingAmount;
      const badges=getBadges(p,parsedOffers);
      return `<div class="parsed-item${isSel?' sel':''}" onclick="toggleOffer(${i})">
        <div class="prow">
          <div class="pcheck${isSel?' on':''}">${isSel?'✓':''}</div>
          <div class="pinfo">
            <div class="pmain">${p.label?`<span class="plbl">${p.label}</span> `:''}${fmt(p.fundingAmount)} × ${p.factorRate} · ${p.termValue} ${p.termType}<br><span style="color:var(--sub)">→ payback <strong style="color:var(--text)">${fmt(payback)}</strong> <span style="font-size:13px;color:var(--muted)">(cost: ${fmt(cost)})</span></span></div>
            ${badges.length?`<div class="pbadges">${badges.map(b=>`<span class="pbadge" style="background:${b.bg};color:${b.c}">${b.l}</span>`).join('')}</div>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.toggleOffer=function(i){
    selectedOffers=selectedOffers.includes(i)?selectedOffers.filter(x=>x!==i):[...selectedOffers,i];
    renderParsed();
  };
})();

['fundingAmount','factorRate','termLength','payment','paybackAmount'].forEach(k=>{
  document.getElementById('field-'+k).addEventListener('change',renderSummary);
});
document.getElementById('btn-add-option').addEventListener('click',addOption);
renderAll();
</script>
</body>
</html>
